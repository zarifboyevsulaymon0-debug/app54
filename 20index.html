<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow - Diqqatni Jamlang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <h1>Focus Flow</h1>
        
        <div class="timer-display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>

        <div class="controls">
            <button id="start">Boshlash</button>
            <button id="reset">Tashlash</button>
        </div>

        <hr>

        <div class="sounds">
            <p>Atmosfera:</p>
            <button onclick="toggleSound('rain')">🌧️ Yomg'ir</button>
            <button onclick="toggleSound('forest')">🌲 O'rmon</button>
        </div>
    </div>

    <!-- Audio fayllar uchun (Internetdan onlayn olinadi) -->
    <audio id="rain-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="forest-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
